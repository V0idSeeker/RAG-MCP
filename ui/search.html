<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Search — DocMCP</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    main { flex: 1; display: flex; flex-direction: column; height: calc(100vh - 57px); }

    .search-bar {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: var(--panel);
    }
    .search-row { display: flex; gap: 10px; }
    .search-row input { flex: 1; font-size: 13px; padding: 10px 14px; }
    .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .ctrl { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--muted); }
    .ctrl select { width: auto; padding: 6px 10px; font-size: 11px; }
    .ctrl input[type=number] { width: 60px; padding: 6px 8px; text-align: center; }
    .searching { display: none; align-items: center; gap: 7px; font-size: 11px; color: var(--muted); margin-left: auto; }

    .results { flex: 1; overflow-y: auto; padding: 16px 24px; display: flex; flex-direction: column; gap: 8px; }

    .card { border: 1px solid var(--border); border-radius: 7px; overflow: hidden; transition: border-color .15s; }
    .card:hover { border-color: var(--border2); }
    .card-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 14px;
      background: var(--panel);
      cursor: pointer;
      user-select: none;
    }
    .card-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
    .card-rank { font-size: 10px; color: var(--muted); width: 22px; flex-shrink: 0; }
    .card-source { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
    .badge-hi { background: rgba(0,255,136,.12); color: var(--green); }
    .badge-mi { background: rgba(0,229,255,.1);  color: var(--accent); }
    .badge-lo { background: rgba(255,255,255,.05); color: var(--muted); }
    .card-chunk { font-size: 10px; color: var(--muted); }
    .card-chev { font-size: 10px; color: var(--muted); transition: transform .2s; margin-left: 4px; }
    .card-chev.open { transform: rotate(90deg); }
    .card-body { display: none; padding: 12px 14px; border-top: 1px solid var(--border); }
    .card-body.open { display: block; }
    .card-text { font-size: 12px; line-height: 1.8; white-space: pre-wrap; word-break: break-word; color: var(--text); }

    .delete-col-btn {
      padding: 6px 10px;
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: 5px;
      color: var(--muted);
      font-family: var(--font);
      font-size: 11px;
      cursor: pointer;
      transition: all .15s;
    }
    .delete-col-btn:hover { color: var(--red); border-color: var(--red); }
  </style>
</head>
<body>
  <header>
    <a class="logo" href="/">DOC<span>MCP</span></a>
    <nav>
      <a href="/ingest.html">Ingest</a>
      <a href="/search.html" class="active">Search</a>
    </nav>
  </header>
  <main>
    <div class="search-bar">
      <div class="search-row">
        <input type="text" id="query" placeholder="Ask anything about your documents…" onkeydown="if(event.key==='Enter')doSearch()" />
        <button class="btn btn-primary" id="search-btn" onclick="doSearch()">Search</button>
      </div>
      <div class="controls">
        <div class="ctrl">
          <span>Collection</span>
          <select id="col-select"><option value="">Loading…</option></select>
          <button class="delete-col-btn" onclick="deleteCol()" title="Delete selected collection">🗑</button>
        </div>
        <div class="ctrl">
          <span>Top K</span>
          <input type="number" id="topk" min="1" max="100" value="5" />
        </div>
        <div class="searching" id="searching">
          <div class="spin"></div> Searching…
        </div>
      </div>
    </div>
    <div class="results" id="results">
      <div class="empty">
        <div class="empty-icon">🔍</div>
        <div class="empty-text">Type a query and hit Search</div>
      </div>
    </div>
  </main>

  <script src="/app.js"></script>
  <script>
    // Page init
    loadCols();
  </script>
</body>
</html>
