<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DocMCP</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 32px; padding: 40px; }
    .tagline { font-size: 11px; color: var(--muted); letter-spacing: .12em; text-transform: uppercase; }
    .cards { display: flex; gap: 16px; }
    .card {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      padding: 28px 36px;
      border: 1px solid var(--border);
      border-radius: 8px;
      text-decoration: none;
      color: var(--text);
      transition: all .2s;
      width: 180px;
      background: var(--panel);
    }
    .card:hover { border-color: var(--accent); box-shadow: 0 0 24px rgba(0,229,255,.1); transform: translateY(-2px); }
    .card-icon { font-size: 28px; }
    .card-label { font-size: 12px; font-weight: 600; letter-spacing: .08em; }
    .card-desc { font-size: 10px; color: var(--muted); text-align: center; }
    .cfg { display: flex; gap: 24px; font-size: 10px; color: var(--muted); }
    .cfg span { padding: 4px 10px; border: 1px solid var(--border); border-radius: 4px; }
    .cfg strong { color: var(--text); }
  </style>
</head>
<body>
  <header>
    <a class="logo" href="/">DOC<span>MCP</span></a>
    <nav>
      <a href="/ingest.html">Ingest</a>
      <a href="/search.html">Search</a>
    </nav>
  </header>
  <main>
    <div>
      <div class="tagline">PDF Vector Search — MCP Server</div>
    </div>
    <div class="cards">
      <a class="card" href="/ingest.html">
        <div class="card-icon">📥</div>
        <div class="card-label">Ingest</div>
        <div class="card-desc">Index PDF folders into ChromaDB</div>
      </a>
      <a class="card" href="/search.html">
        <div class="card-icon">🔍</div>
        <div class="card-label">Search</div>
        <div class="card-desc">Semantic search across your docs</div>
      </a>
    </div>
    <div class="cfg" id="cfg">
      <span>Loading config…</span>
    </div>
  </main>
  <script>
    fetch('/api/config').then(r => r.json()).then(c => {
      document.getElementById('cfg').innerHTML =
        `<span>ChromaDB <strong>${c.chromaUrl}</strong></span>` +
        `<span>Collection <strong>${c.defaultCollection}</strong></span>` +
        `<span>Port <strong>${c.port}</strong></span>`;
    });
  </script>
</body>
</html>
