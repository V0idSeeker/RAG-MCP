<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ingest — DocMCP</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    main { flex: 1; display: grid; grid-template-columns: 380px 1fr; height: calc(100vh - 57px); }

    /* Left panel */
    .left { padding: 24px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
    .section-label { font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .divider { text-align: center; font-size: 10px; color: var(--muted); position: relative; }
    .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 38%; height: 1px; background: var(--border); }
    .divider::before { left: 0; } .divider::after { right: 0; }
    .row { display: flex; gap: 8px; }
    .row input { flex: 1; }
    #active-col { font-size: 12px; color: var(--accent); padding: 8px 12px; border: 1px solid rgba(0,229,255,.2); border-radius: 5px; background: rgba(0,229,255,.04); min-height: 36px; display: flex; align-items: center; }
    #active-col.empty { color: var(--muted); border-color: var(--border2); background: transparent; }

    /* Right panel */
    .right { display: flex; flex-direction: column; }
    .log-header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .log-title { font-size: 11px; letter-spacing: .08em; color: var(--muted); text-transform: uppercase; }
    .status { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border2); transition: background .3s; }
    .dot.running { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 1s infinite; }
    .dot.done { background: var(--green); }
    .dot.error { background: var(--red); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .log-body { flex: 1; overflow-y: auto; padding: 12px 20px; display: flex; flex-direction: column; gap: 3px; }
    .log-line { display: flex; align-items: baseline; gap: 10px; font-size: 11px; line-height: 1.6; }
    .log-time { color: var(--muted); font-size: 10px; flex-shrink: 0; }
    .log-tag { font-size: 9px; padding: 1px 5px; border-radius: 3px; flex-shrink: 0; font-weight: 600; letter-spacing: .05em; }
    .t-info { background: rgba(0,229,255,.1); color: var(--accent); }
    .t-file { background: rgba(100,100,255,.15); color: #8888ff; }
    .t-ok   { background: rgba(0,255,136,.1);  color: var(--green); }
    .t-err  { background: rgba(255,69,102,.1);  color: var(--red); }
    .t-mdl  { background: rgba(255,200,0,.1);   color: #ffc800; }
    .t-log  { background: rgba(255,255,255,.05); color: var(--muted); }
    .t-done { background: rgba(0,255,136,.15);  color: var(--green); }
    .log-msg { color: var(--text); word-break: break-word; }
    .log-footer { padding: 12px 20px; border-top: 1px solid var(--border); }
    .progress { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; transition: width .4s; }
  </style>
</head>
<body>
  <header>
    <a class="logo" href="/">DOC<span>MCP</span></a>
    <nav>
      <a href="/ingest.html" class="active">Ingest</a>
      <a href="/search.html">Search</a>
    </nav>
  </header>
  <main>
    <!-- Left: config -->
    <div class="left">
      <div>
        <div class="section-label">PDF Folder</div>
        <div class="field">
          <input type="text" id="folder" placeholder="C:\path\to\pdfs" />
        </div>
      </div>

      <div>
        <div class="section-label">Collection</div>
        <div class="field">
          <div class="section-label" style="margin-bottom:4px">Existing</div>
          <div class="col-grid" id="colGrid">
            <div class="empty"><div class="spin"></div></div>
          </div>
        </div>
        <div class="divider" style="margin:14px 0">or create new</div>
        <div class="field">
          <div class="row">
            <input type="text" id="new-col" placeholder="my-collection (min 3 chars)" />
            <button class="btn btn-ghost" onclick="useNew()">Use</button>
          </div>
        </div>
        <div class="field" style="margin-top:10px">
          <div class="section-label">Active</div>
          <div id="active-col" class="empty">(none selected)</div>
        </div>
      </div>

      <button class="btn btn-primary" id="start-btn" onclick="startIngest()" style="width:100%;justify-content:center">
        ▶ Start Ingestion
      </button>
    </div>

    <!-- Right: live log -->
    <div class="right">
      <div class="log-header">
        <span class="log-title">Live Progress</span>
        <div class="status">
          <span id="status-text">Idle</span>
          <div class="dot" id="dot"></div>
        </div>
      </div>
      <div class="log-body" id="log-body">
        <div class="empty">
          <div class="empty-icon">📂</div>
          <div class="empty-text">Set a folder and collection, then start</div>
        </div>
      </div>
      <div class="log-footer">
        <div class="progress"><div class="progress-fill" id="progress"></div></div>
      </div>
    </div>
  </main>

  <script src="/app.js"></script>
  <script>
    // Page init
    loadCols();
  </script>
</body>
</html>
